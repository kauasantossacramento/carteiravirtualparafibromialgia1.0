<div class="field {% if field.errors %}has-error{% endif %}">
  <label for="{{ field.id_for_label }}">{{ field.label }}</label>
  {{ field }}
  {% if field.help_text %}
  <small class="help">{{ field.help_text|safe }}</small>
  {% endif %}
  {% for err in field.errors %}
    <div class="error">{{ err }}</div>
  {% endfor %}
</div>
